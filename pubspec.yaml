name: fast_image_editor
description: >-
  Native C image editing for Flutter. Blur, sepia, saturation, brightness,
  contrast, sharpen, grayscale with region-based effects via FFI.
version: 0.1.0

homepage: https://github.com/erykkruk/fast_image_editor
repository: https://github.com/erykkruk/fast_image_editor
issue_tracker: https://github.com/erykkruk/fast_image_editor/issues

topics:
  - image
  - image-processing
  - image-editor
  - filter
  - blur

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  plugin:
    platforms:
      android:
        ffiPlugin: true
      ios:
        ffiPlugin: true
